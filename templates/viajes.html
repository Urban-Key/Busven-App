<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --azul: #2e3192;
}

body {
    font-family: 'Segoe UI', Arial;
    margin: 0;
    background: linear-gradient(rgba(46,49,146,0.9), rgba(30,33,100,0.95)),
    url("/static/logo.png");
    background-size: cover;
}

.header {
    background: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.container {
    width: 90%;
    max-width: 900px;
    margin: 40px auto;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

/* RUTA */
.ruta {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.ciudad {
    text-align: center;
    width: 30%;
}

.ciudad i {
    color: var(--azul);
    font-size: 20px;
}

/* LINEA */
.linea {
    flex: 1;
    height: 2px;
    background: #ccc;
    margin: 0 10px;
    position: relative;
}

.linea::after {
    content: "➜";
    position: absolute;
    right: -10px;
    top: -8px;
    font-size: 20px;
}

/* INFO CENTRADA */
.info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
}

.hora {
    font-size: 22px;
    font-weight: bold;
    color: var(--azul);
    text-align: center;
    width: 100%;
}

.precio {
    font-size: 18px;
    font-weight: bold;
}

/* BOTON */
.btn {
    background: var(--azul);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    width: 100%;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="header">BusVen</div>

<div class="container">

<h2 style="color:white;">Horarios disponibles</h2>

{% for viaje in viajes %}

<div class="card">

    <div class="ruta">

        <!-- ORIGEN -->
        <div class="ciudad">
            <i class="fas fa-map-marker-alt"></i>
            <div>{{ origen }}</div>
            <small>{{ viaje.salida }}</small>
        </div>

        <div class="linea"></div>

        <!-- DESTINO -->
        <div class="ciudad">
            <i class="fas fa-map-marker-alt"></i>
            <div>{{ destino }}</div>
            <small>{{ viaje.llegada }}</small>
        </div>

    </div>

    <div class="info">
        <div class="hora">{{ viaje.hora }}</div>
        <div class="precio">{{ viaje.precio }}</div>
    </div>

    <form method="POST" action="/comprar">
        <input type="hidden" name="origen" value="{{ origen }}">
        <input type="hidden" name="destino" value="{{ destino }}">
        <input type="hidden" name="fecha" value="{{ fecha }}">
        <input type="hidden" name="pasajeros" value="{{ pasajeros }}">
        <input type="hidden" name="hora" value="{{ viaje.hora }}">

        <button class="btn">Seleccionar</button>
    </form>

</div>

{% endfor %}

</div>

</body>
</html>

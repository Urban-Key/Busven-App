<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --azul: #2e3192;
    --gris: #ccc;
    --verde: #28a745;
    --ocupado: #999;
}

body {
    font-family: 'Segoe UI';
    margin: 0;
    background: linear-gradient(rgba(46,49,146,0.9), rgba(30,33,100,0.95)),
    url("/static/logo.png");
    background-size: cover;
}

.container {
    width: 90%;
    max-width: 500px;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.bus {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 20px;
}

.asiento {
    padding: 12px;
    border-radius: 8px;
    background: var(--gris);
    cursor: pointer;
    font-weight: bold;
}

.asiento.selected {
    background: var(--verde);
    color: white;
}

.asiento.ocupado {
    background: var(--ocupado);
    cursor: not-allowed;
}

.pasillo {
    background: transparent;
}

.pasajero {
    margin-top: 5px;
    font-size: 14px;
}

.btn {
    background: var(--azul);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 10px;
    width: 100%;
    margin-top: 20px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<!-- 🔥 AQUÍ ESTÁ LA CLAVE -->
<body data-pasajeros="{{ nombres|length }}">

<div class="container">

<h2>Selecciona tus asientos</h2>

<p><b>{{ origen }} → {{ destino }}</b></p>
<p>{{ fecha }} | {{ hora }}</p>

<!-- PASAJEROS -->
<div>
{% for n in nombres %}
    <div class="pasajero">🧍 {{ n }}</div>
{% endfor %}
</div>

<!-- BUS -->
<div class="bus" id="bus"></div>

<form action="/pago" method="POST">

<input type="hidden" name="origen" value="{{ origen }}">
<input type="hidden" name="destino" value="{{ destino }}">
<input type="hidden" name="fecha" value="{{ fecha }}">
<input type="hidden" name="hora" value="{{ hora }}">
<input type="hidden" name="asientos" id="asientosInput">
<input type="hidden" name="pasajeros" value="{{ pasajeros }}">

<!-- DATOS -->
{% for n in nombres %}
<input type="hidden" name="nombre[]" value="{{ n }}">
{% endfor %}

{% for d in documentos %}
<input type="hidden" name="documento[]" value="{{ d }}">
{% endfor %}

<input type="hidden" name="correo" value="{{ correo }}">

<button class="btn">Confirmar y continuar</button>

</form>

</div>

<script>

// 🔥 TOTAL CORRECTO
let total = parseInt(document.body.getAttribute("data-pasajeros")) || 1;

let seleccionados = [];
let ocupados = [3, 7, 12]; // prueba

let bus = document.getElementById("bus");

let numero = 1;

for(let fila = 0; fila < 5; fila++){

    for(let col = 0; col < 5; col++){

        if(col === 2){
            let pasillo = document.createElement("div");
            pasillo.className = "pasillo";
            bus.appendChild(pasillo);
            continue;
        }

        let div = document.createElement("div");
        div.className = "asiento";
        div.innerText = numero;

        // 🔥 GUARDAMOS EL NÚMERO CORRECTO
        let asientoNumero = numero;

        if(ocupados.includes(asientoNumero)){
            div.classList.add("ocupado");
        }

        div.onclick = function(){

            if(div.classList.contains("ocupado")) return;

            if(seleccionados.includes(asientoNumero)){
                seleccionados = seleccionados.filter(x => x !== asientoNumero);
                div.classList.remove("selected");
            } else {

                if(seleccionados.length >= total){
                    alert("Solo puedes elegir " + total + " asientos");
                    return;
                }

                seleccionados.push(asientoNumero);
                div.classList.add("selected");
            }

            document.getElementById("asientosInput").value = seleccionados.join(",");
        }

        bus.appendChild(div);
        numero++;
    }
}

</script>

</body>
</html>

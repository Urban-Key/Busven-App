<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --azul: #2e3192;
}

body {
    font-family: 'Segoe UI', Arial;
    margin: 0;

    background: linear-gradient(rgba(46,49,146,0.9), rgba(30,33,100,0.95)),
    url("/static/logo.png");
    background-size: cover;
    background-position: center;
}

/* HEADER */
.header {
    background: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

/* CAJA */
.search-box {
    width: 95%;
    max-width: 1000px;
    margin: 40px auto;
    background: #f4f5f7;
    padding: 25px;
    border-radius: 15px;
}

/* INPUTS */
.input-box {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}

label {
    font-size: 13px;
    color: #666;
}

input {
    width: 100%;
    border: none;
    outline: none;
    font-size: 16px;
}

/* FILA */
.row {
    display: flex;
    gap: 10px;
}

/* BOTON */
.btn {
    background: var(--azul);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    width: 250px;
}

/* DROPDOWN */
.dropdown {
    position: relative;
}

.dropdown-content {
    display: none;
    position: absolute;
    background: white;
    padding: 15px;
    border-radius: 10px;
    top: 60px;
    width: 250px;
}

.dropdown.active .dropdown-content {
    display: block;
}

.counter {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">BusVen</div>

<div class="search-box">

<form action="/viajes" method="POST">

<div class="row">

    <div class="input-box">
        <label>Origen</label>
        <input type="text" name="origen" required>
    </div>

    <div class="input-box">
        <label>Destino</label>
        <input type="text" name="destino" required>
    </div>

</div>

<div class="input-box">
    <label>¿Qué fecha deseas viajar?</label>
    <input type="date" name="fecha" required>
</div>

<div class="row">

    <div class="input-box dropdown" onclick="toggleDropdown()">
        <label>Cantidad de pasajeros</label>
        <input type="text" id="displayPasajeros" value="1 pasajero" readonly>

        <div class="dropdown-content" id="dropdown">

            <div class="counter">
                Pasajeros
                <div>
                    <button type="button" onclick="cambiar(-1)">-</button>
                    <span id="num">1</span>
                    <button type="button" onclick="cambiar(1)">+</button>
                </div>
            </div>

        </div>
    </div>

    <input type="hidden" name="pasajeros" id="pasajerosHidden" value="1">

    <button class="btn" type="submit">Buscar viaje</button>

</div>

</form>

</div>

<script>

let total = 1;

function toggleDropdown() {
    document.querySelector(".dropdown").classList.toggle("active");
}

function cambiar(valor) {
    let el = document.getElementById("num");
    let num = parseInt(el.innerText);

    num += valor;
    if (num < 1) num = 1;

    el.innerText = num;
    total = num;

    document.getElementById("displayPasajeros").value = num + " pasajero(s)";
    document.getElementById("pasajerosHidden").value = num;
}

</script>

</body>
</html>
